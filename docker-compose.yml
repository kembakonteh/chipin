services:
  chipin-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - chipin_postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chipin-internal

  chipin-redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chipin-internal

  chipin-backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@chipin-db:5432/${POSTGRES_DB}
      REDIS_URL: redis://chipin-redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      META_WHATSAPP_TOKEN: ${META_WHATSAPP_TOKEN}
      META_PHONE_NUMBER_ID: ${META_PHONE_NUMBER_ID}
      FRONTEND_URL: ${FRONTEND_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      MAIL_FROM: ${MAIL_FROM}
    depends_on:
      chipin-db:
        condition: service_healthy
      chipin-redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chipin-api.rule=Host(`chipin.kafotech.io`) && PathPrefix(`/api`)"
      - "traefik.http.routers.chipin-api.entrypoints=websecure"
      - "traefik.http.routers.chipin-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.chipin-api.loadbalancer.server.port=8000"
    networks:
      - chipin-internal
      - web

  chipin-worker:
    build: ./backend
    command: python -m arq app.workers.main.WorkerSettings
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@chipin-db:5432/${POSTGRES_DB}
      REDIS_URL: redis://chipin-redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      META_WHATSAPP_TOKEN: ${META_WHATSAPP_TOKEN}
      META_PHONE_NUMBER_ID: ${META_PHONE_NUMBER_ID}
      FRONTEND_URL: ${FRONTEND_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    depends_on:
      chipin-db:
        condition: service_healthy
      chipin-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - chipin-internal

  chipin-frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5176:5173"
    environment:
      VITE_API_URL: ${FRONTEND_URL}/api/v1
    depends_on:
      - chipin-backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chipin.rule=Host(`chipin.kafotech.io`)"
      - "traefik.http.routers.chipin.entrypoints=websecure"
      - "traefik.http.routers.chipin.tls.certresolver=letsencrypt"
      - "traefik.http.services.chipin.loadbalancer.server.port=5173"
    networks:
      - chipin-internal
      - web

networks:
  chipin-internal:
    driver: bridge
  web:
    name: web
    external: true

volumes:
  chipin_postgres_data:
